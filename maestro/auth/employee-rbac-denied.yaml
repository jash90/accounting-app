url: ${BASE_URL}/login
name: "Web — EMPLOYEE accessing company profile is redirected to unauthorized"
tags:
  - smoke
  - auth
  - rbac
env:
  BASE_URL: "https://accounting-app-prod.vercel.app"
  EMAIL: "a.kowalska@biuro-nowak.pl"
  PASSWORD: "Demo12345678!"
---
- runFlow:
    file: ../_helpers/login-employee.yaml
    env:
      BASE_URL: ${BASE_URL}
      EMAIL: ${EMAIL}
      PASSWORD: ${PASSWORD}

# As employee, navigate directly to a COMPANY_OWNER-only route.
# `routes.tsx:121` gates /company/* with `OWNER_ROLES` → ProtectedRoute redirects.
- openLink: ${BASE_URL}/company/profile

# The Unauthorized page renders English text (i18n follow-up tracked in README).
- extendedWaitUntil:
    visible: "Unauthorized"
    timeout: 10000
- assertVisible: "You don't have permission to access this page."

# Did NOT land on the company profile form
- assertNotVisible: "Profil firmy"
- assertNotVisible: "Dane podstawowe"

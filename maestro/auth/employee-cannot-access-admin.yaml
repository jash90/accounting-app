url: ${BASE_URL}/login
name: "Web — EMPLOYEE cannot access admin routes"
tags:
  - smoke
  - auth
  - rbac
env:
  BASE_URL: "https://accounting-app-prod.vercel.app"
  EMAIL: "a.kowalska@biuro-nowak.pl"
  PASSWORD: "Demo12345678!"
---
- runFlow:
    file: ../_helpers/login-employee.yaml
    env:
      BASE_URL: ${BASE_URL}
      EMAIL: ${EMAIL}
      PASSWORD: ${PASSWORD}

# Each /admin/* route is gated by ADMIN_ROLES → EMPLOYEE gets redirected to /unauthorized.
# RBAC-TEST-PLAN.md P1 cases #1-#4.

- openLink: ${BASE_URL}/admin
- extendedWaitUntil:
    visible: "Unauthorized"
    timeout: 10000
- assertVisible: "You don't have permission to access this page."
- assertNotVisible: "Panel Administratora"

- openLink: ${BASE_URL}/admin/users
- extendedWaitUntil:
    visible: "Unauthorized"
    timeout: 10000

- openLink: ${BASE_URL}/admin/companies
- extendedWaitUntil:
    visible: "Unauthorized"
    timeout: 10000

- openLink: ${BASE_URL}/admin/email-config
- extendedWaitUntil:
    visible: "Unauthorized"
    timeout: 10000

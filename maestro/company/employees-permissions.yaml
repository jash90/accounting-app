url: ${BASE_URL}/login
name: "Web — employee permissions page renders module access matrix"
tags:
  - smoke
  - employees
env:
  BASE_URL: "https://accounting-app-prod.vercel.app"
  EMAIL: "nowak@biuro-nowak.pl"
  PASSWORD: "Demo12345678!"
---
- runFlow:
    file: ../_helpers/login.yaml
    env:
      BASE_URL: ${BASE_URL}
      EMAIL: ${EMAIL}
      PASSWORD: ${PASSWORD}

# Navigate to employees list, then drill into Anna Kowalska's permissions.
- tapOn: "Pracownicy"
- extendedWaitUntil:
    visible: "Zarządzaj pracownikami firmy"
    timeout: 10000

# Each row's "Zarządzaj uprawnieniami" button has a stable HTML id namespaced
# by email (added in commit 3c78029). Maestro Web's `id:` selector matches it
# directly — the icon-only button is no longer reachable by text content alone.
- tapOn:
    id: "employee-permissions-a.kowalska@biuro-nowak.pl"

# Permissions page renders for Anna
- extendedWaitUntil:
    visible: "Uprawnienia: Anna Kowalska"
    timeout: 10000
- assertVisible: "Zarządzaj dostępem do modułów i uprawnieniami tego pracownika"
- assertVisible: "Nadaj dostęp do modułu"

# Module-permission matrix structure: each module has Read/Write/Delete checkboxes
- assertVisible: "Read"
- assertVisible: "Write"
- assertVisible: "Delete"

# At least one module section is visible (Dokumenty is alphabetically first,
# so it's at the top of the viewport)
- assertVisible: "Dokumenty"

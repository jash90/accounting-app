url: ${BASE_URL}/login
name: "Web — employee permissions page renders module access matrix"
tags:
  - wip
  - employees
# WHY WIP: The "Zarządzaj uprawnieniami" / "Edytuj pracownika" / "Usuń pracownika"
# buttons in `apps/web/src/pages/company/employees-list.tsx` are icon-only with
# aria-label as the only text. Maestro Web's `tapOn: "<text>"` matches visible
# text content, NOT aria-labels — so we cannot drill into the permissions page
# from the employees list without either:
#   1) visible text being added to those buttons (e.g. show "Uprawnienia"
#      label on hover/desktop), OR
#   2) `id="..."` HTML attributes on each row's action buttons.
# Until then, the permissions URL is `/company/employees/:id/permissions` with
# a runtime UUID — not reachable by URL alone.
env:
  BASE_URL: "https://accounting-app-prod.vercel.app"
  EMAIL: "nowak@biuro-nowak.pl"
  PASSWORD: "Demo12345678!"
---
- runFlow:
    file: ../_helpers/login.yaml
    env:
      BASE_URL: ${BASE_URL}
      EMAIL: ${EMAIL}
      PASSWORD: ${PASSWORD}

# Navigate to employees list, then drill into Anna Kowalska's permissions.
- tapOn: "Pracownicy"
- extendedWaitUntil:
    visible: "Zarządzaj pracownikami firmy"
    timeout: 10000

# Each employee row has a "Zarządzaj uprawnieniami" button. Tap the first one —
# we don't care which employee we drill into, only that the matrix renders.
- tapOn:
    text: "Zarządzaj uprawnieniami"
    index: 0

# Permissions page heading prefixed with "Uprawnienia:" + employee full name.
# Match the prefix only — works regardless of which row was tapped.
- extendedWaitUntil:
    visible: "Uprawnienia:"
    timeout: 10000
- assertVisible: "Zarządzaj dostępem do modułów i uprawnieniami tego pracownika"
- assertVisible: "Nadaj dostęp do modułu"

# Module-permission matrix structure: each module has Read/Write/Delete checkboxes
- assertVisible: "Read"
- assertVisible: "Write"
- assertVisible: "Delete"

# At least one module section is visible (Dokumenty is alphabetically first,
# so it's at the top of the viewport)
- assertVisible: "Dokumenty"

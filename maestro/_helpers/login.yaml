url: ${BASE_URL}/login
name: "Helper: login as COMPANY_OWNER"
tags:
  - helper
env:
  BASE_URL: "https://accounting-app-prod.vercel.app"
  EMAIL: "nowak@biuro-nowak.pl"
  PASSWORD: "Demo12345678!"
---
# Reusable login subflow — leaves the browser on the COMPANY_OWNER dashboard
# ("Panel Firmy"). The 7 form-fill steps below MUST stay in sync with
# `login-employee.yaml`. Maestro 2.3.0 does not propagate env vars through a
# nested runFlow chain (parent → wrapper → form-helper), so a parameterized
# base helper does not work — the inner flow receives literal "${EMAIL}" etc.
# Differences vs. login-employee.yaml are isolated to:
#   - env defaults (EMAIL / PASSWORD)
#   - the LANDING text in extendedWaitUntil
- launchApp
- assertVisible: "Witaj ponownie"
- tapOn: "Email"
- inputText: ${EMAIL}
- tapOn: "Hasło"
- inputText: ${PASSWORD}
- tapOn: "Zaloguj się"
- extendedWaitUntil:
    visible: "Panel Firmy"
    timeout: 15000

url: ${BASE_URL}/login
name: "Helper: login as EMPLOYEE (Anna Kowalska)"
tags:
  - helper
env:
  BASE_URL: "https://accounting-app-prod.vercel.app"
  EMAIL: "a.kowalska@biuro-nowak.pl"
  PASSWORD: "Demo12345678!"
---
# Reusable login subflow for EMPLOYEE role — lands on /modules with employee
# sidebar. The 7 form-fill steps below MUST stay in sync with `login.yaml`.
# (See login.yaml for why we can't extract a shared base via runFlow.)
# Differences vs. login.yaml are isolated to:
#   - env defaults (EMAIL / PASSWORD)
#   - the LANDING text in extendedWaitUntil
- launchApp
- assertVisible: "Witaj ponownie"
- tapOn: "Email"
- inputText: ${EMAIL}
- tapOn: "Hasło"
- inputText: ${PASSWORD}
- tapOn: "Zaloguj się"
- extendedWaitUntil:
    visible: "Przegląd Twojego obszaru roboczego"
    timeout: 15000

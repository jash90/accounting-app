# Maestro workspace config.
# Default `maestro test maestro/` runs only flows tagged "smoke" and skips
# helpers (tag: helper) plus any work-in-progress flows (tag: wip).
includeTags:
  - smoke
excludeTags:
  - helper
  - manual
  - wip
  - wip-needs-seed # awaiting backend seeder deploy (Roman Read-Only)
